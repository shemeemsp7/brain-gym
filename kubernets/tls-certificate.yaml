apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: brain-gym-tls-cert
  namespace: brain-gym
spec:
  secretName: brain-gym-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - brain-gym.example.com
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com  # Replace with your actual email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        route53:
          region: us-east-1  # Replace with your AWS region
          accessKeyID: ""  # Will be provided via IRSA or IAM role
          secretAccessKeySecretRef:
            name: route53-credentials
            key: secret-access-key
      selector:
        dnsZones:
        - example.com
