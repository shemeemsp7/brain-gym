apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-config
  namespace: brain-gym
data:
  postgres_exporter.yml: |
    datasource_name: "postgresql://postgres:root@postgres-service:5432/ascendarium?sslmode=disable"
    
    # Custom queries for monitoring
    queries:
      - name: "database_size"
        query: "SELECT pg_database_size('ascendarium') as size_bytes"
        metrics:
          - size_bytes:
              usage: "GAUGE"
              description: "Size of the database in bytes"
      
      - name: "active_connections"
        query: "SELECT count(*) as active_connections FROM pg_stat_activity WHERE state = 'active'"
        metrics:
          - active_connections:
              usage: "GAUGE"
              description: "Number of active connections"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: brain-gym
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: postgres-exporter
        image: quay.io/prometheuscommunity/postgres-exporter:latest
        ports:
        - containerPort: 9187
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: brain-gym-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: config
          mountPath: /etc/postgres_exporter
      volumes:
      - name: config
        configMap:
          name: postgres-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-service
  namespace: brain-gym
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  ports:
  - port: 9187
    targetPort: 9187
    name: metrics
  selector:
    app: postgres-exporter
