# GitHub Actions workflow for Docker build and push
# This workflow builds a Docker image and pushes it to Docker Hub on every push to main

name: Docker Build and Push

on:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main
  workflow_dispatch: {}
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: 📋 Log workflow start
        run: |
          echo "🚀 Starting Docker build and push workflow"
          echo "📅 Timestamp: $(date)"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "💾 Commit: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"

      - name: 📋 Log runner info
        run: |
          echo "🏃 Runner: ${{ runner.name }}"
          echo "🧰 OS: ${{ runner.os }} | Arch: ${{ runner.arch }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📋 Log checkout completion
        run: |
          echo "✅ Code checkout completed"
          echo "📁 Working directory contents:"
          ls -la

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📋 Log Docker Buildx setup
        run: |
          echo "✅ Docker Buildx setup completed"
          docker buildx version
          docker buildx ls

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: 📋 Log DockerHub login
        run: |
          echo "✅ DockerHub login completed"
          echo "🏷️  Target image: ${{ env.DOCKERHUB_USERNAME }}/brain-gym:latest"

      - name: 📋 Log before build
        run: |
          echo "🔨 Starting Docker image build and push"
          echo "📦 Context: ."
          echo "🏷️  Tag: ${{ env.DOCKERHUB_USERNAME }}/brain-gym:latest"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/brain-gym:latest

      - name: 📋 Log workflow completion
        run: |
          echo "🎉 Docker build and push workflow completed successfully!"
          echo "✅ Image pushed to: ${{ env.DOCKERHUB_USERNAME }}/brain-gym:latest"
          echo "⏰ Completed at: $(date)"
